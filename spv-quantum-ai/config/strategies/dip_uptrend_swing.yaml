name: dip_uptrend_swing
description: >-
  Buy-the-dip in an uptrend. Verified edge on 2 years of NSE daily data
  (out-of-sample PF 1.54, positive in both market regimes). Enter when a stock
  drops >=3% in a day but is still above its 50-day SMA; exit on the first up-close.
enabled: false
version: 1.0.0
rules:
  operator: AND
  conditions:
  - key: ROC_1
    operator: '<'
    source: indicator
    value: -3.0
  - key: CLOSE
    operator: '>'
    source: indicator
    target: SMA_50
exit_rules:
  operator: AND
  conditions:
  - key: ROC_1
    operator: '>'
    source: indicator
    value: 0.0
actions:
  matched:
    action: SIGNAL_BUY
    confidence: 80.0
    reason: >-
      Dropped >=3% intraday but holding above the 50-day SMA — a dip inside an
      uptrend (verified edge, OOS profit factor 1.54).
  exit:
    action: SIGNAL_SELL
    confidence: 75.0
    reason: First up-close after the dip entry — take the mean-reversion bounce.
