name: options_1to5_ratio_pe
version: 1.0.0
description: Options buying (PUT side) targeting a 1:5 Risk-to-Reward Ratio. Enter Put (PE) on bearish momentum (EMA_9 < EMA_20 and RSI < 45) in a bearish regime. Exit at strict Stop Loss (RSI > 60) or 1:5 target (RSI <= 20). Mirror of options_1to5_ratio for the down side.
enabled: true
timeframe: "15m"
symbols: ["NIFTY50", "BANKNIFTY"]
trade_as: "ATM_PE"
rules:
  operator: AND
  conditions:
    - source: indicator
      key: EMA_9
      operator: '<'
      target: EMA_20
    - source: indicator
      key: RSI
      operator: '<'
      value: 45.0
    - source: market_regime
      operator: '=='
      value: TRENDING_BEARISH
    - source: employee          # News employee must NOT be bullish to buy a put
      key: EMP-NWS
      operator: '!='
      value: BUY
exit_rules:
  operator: OR
  conditions:
    - source: indicator
      key: RSI
      operator: '>'
      value: 60.0  # Stop Loss — market recovering, the put is losing
    - source: indicator
      key: RSI
      operator: '<='
      value: 20.0  # 1:5 Take Profit — deeply oversold, put target hit
actions:
  matched:
    action: SIGNAL_BUY
    confidence: 90.0
    reason: EMA_9 is below EMA_20, RSI < 45, and Market Regime is Bearish. Buying the ATM Put.
  exit:
    action: SIGNAL_SELL
    confidence: 90.0
    reason: Exit triggered. Stop Loss (RSI > 60) or 1:5 Reward target (RSI <= 20) hit.
