name: options_1to5_ratio_pe
version: 1.0.0
description: >-
  Options buying (PUT side). Enter ATM PE on bearish momentum (EMA_9 < EMA_20,
  RSI < 45) in a bearish regime, confirmed by the News employee not being
  bullish. EXIT is handled entirely by the Safety Engine on the OPTION PREMIUM
  (wide hidden stop-loss + volatility-adaptive trailing stop) — never on the
  underlying's RSI. There are deliberately no exit_rules here.
enabled: true
timeframe: "3m"
symbols: ["NIFTY50", "BANKNIFTY"]
trade_as: "ATM_PE"
rules:
  operator: AND
  conditions:
    - source: indicator
      key: EMA_9
      operator: '<'
      target: EMA_20
    - source: indicator
      key: RSI
      operator: '<'
      value: 45.0
    - source: market_regime
      operator: '=='
      value: TRENDING_BEARISH
    - source: employee          # News employee must NOT be bullish to buy a put
      key: EMP-NWS
      operator: '!='
      value: BUY
actions:
  matched:
    action: SIGNAL_BUY
    confidence: 90.0
    reason: >-
      EMA_9 below EMA_20, RSI < 45, bearish regime, News not bullish. Buying the
      ATM PE. Exit is premium-based (Safety Engine hidden SL + trailing).
