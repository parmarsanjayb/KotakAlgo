name: cci_reversal_swing
description: >-
  Reversal swing trade using CCI. Buy when CCI turns up out of oversold
  (crosses above -100) — the point where a falling stock reverses — then ride
  the swing and sell when RSI reaches overbought (70). Verified on 2 years of
  NSE daily data: out-of-sample profit factor 1.83, positive in both regimes,
  ~20-day average hold. Uses indicators only (CCI entry, RSI exit).
enabled: true
version: 1.0.0
rules:
  operator: AND
  conditions:
  - key: CCI
    operator: crosses_above
    source: indicator
    value: -100.0
exit_rules:
  operator: AND
  conditions:
  - key: RSI
    operator: '>='
    source: indicator
    value: 70.0
actions:
  matched:
    action: SIGNAL_BUY
    confidence: 80.0
    reason: >-
      CCI crossed up through -100 — a reversal out of oversold. Enter the swing
      (verified edge, OOS profit factor 1.83).
  exit:
    action: SIGNAL_SELL
    confidence: 75.0
    reason: RSI reached overbought (70) — take the swing profit.
