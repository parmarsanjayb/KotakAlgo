name: options_1to5_ratio
version: 1.0.0
description: >-
  Options buying (CALL side). Enter ATM CE on bullish momentum (EMA_9 > EMA_20,
  RSI > 55) in a bullish regime, confirmed by the News employee not being
  bearish. EXIT is handled entirely by the Safety Engine on the OPTION PREMIUM
  (wide hidden stop-loss + volatility-adaptive trailing stop) — never on the
  underlying's RSI. There are deliberately no exit_rules here.
enabled: true
timeframe: "3m"
symbols: ["NIFTY50", "BANKNIFTY"]
trade_as: "ATM_CE"
rules:
  operator: AND
  conditions:
    - source: indicator
      key: EMA_9
      operator: '>'
      target: EMA_20
    - source: indicator
      key: RSI
      operator: '>'
      value: 55.0
    - source: market_regime
      operator: '=='
      value: TRENDING_BULLISH
    - source: employee          # News employee must NOT be bearish to buy a call
      key: EMP-NWS
      operator: '!='
      value: SELL
actions:
  matched:
    action: SIGNAL_BUY
    confidence: 90.0
    reason: >-
      EMA_9 above EMA_20, RSI > 55, bullish regime, News not bearish. Buying the
      ATM CE. Exit is premium-based (Safety Engine hidden SL + trailing).
