name: options_1to5_ratio
version: 1.0.0
description: Options buying strategy targeting a 1:5 Risk-to-Reward Ratio. Enter Call (CE) on momentum breakouts (EMA_9 > EMA_20 and RSI > 55) in a bullish regime. Exit at strict Stop Loss (RSI < 40) or 1:5 target (RSI >= 80).
enabled: true
timeframe: "15m"
symbols: ["NIFTY50", "BANKNIFTY"]
trade_as: "ATM_CE"
rules:
  operator: AND
  conditions:
    - source: indicator
      key: EMA_9
      operator: '>'
      target: EMA_20
    - source: indicator
      key: RSI
      operator: '>'
      value: 55.0
    - source: market_regime
      operator: '=='
      value: TRENDING_BULLISH
exit_rules:
  operator: OR
  conditions:
    - source: indicator
      key: RSI
      operator: '<'
      value: 40.0  # Stop Loss (small risk)
    - source: indicator
      key: RSI
      operator: '>='
      value: 80.0  # 1:5 Take Profit (large reward)
actions:
  matched:
    action: SIGNAL_BUY
    confidence: 90.0
    reason: EMA_9 is above EMA_20, RSI > 55, and Market Regime is Bullish. Entering option trade.
  exit:
    action: SIGNAL_SELL
    confidence: 90.0
    reason: Exit triggered. Stop Loss (RSI < 40) or 1:5 Reward target (RSI >= 80) hit.
