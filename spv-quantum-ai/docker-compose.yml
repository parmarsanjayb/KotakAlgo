version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: spv_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass_123
      POSTGRES_DB: spv_quantum_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spv_quantum_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: spv_app
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DOCKER_CONTAINER=true
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
